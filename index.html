<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Phycho</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#ff758f,#ff8fa3);
font-family:Arial;
overflow:hidden;
color:white;
}

h1{
font-size:50px;
margin-bottom:40px;
text-shadow:0 0 20px rgba(0,0,0,0.3);
}

#heart{
position:relative;
width:500px;
height:450px;
}

.word{
position:absolute;
font-weight:bold;
font-size:18px;
color:white;
text-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* typing message */

#message{
margin-top:30px;
font-size:24px;
max-width:750px;
text-align:center;
line-height:1.6;
min-height:120px;
}

.cursor{
display:inline-block;
width:3px;
background:white;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1}
25%,75%{opacity:0}
}

/* floating hearts */

.bg span{
position:absolute;
bottom:-50px;
font-size:20px;
animation:float 10s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

</style>
</head>

<body>

<h1>good health pray🤍</h1>

<div id="heart"></div>

<div id="message"></div>

<div class="bg">
<span style="left:10%">❤️</span>
<span style="left:20%">❤️</span>
<span style="left:30%">❤️</span>
<span style="left:40%">❤️</span>
<span style="left:50%">❤️</span>
<span style="left:60%">❤️</span>
<span style="left:70%">❤️</span>
<span style="left:80%">❤️</span>
<span style="left:90%">❤️</span>
</div>

<script>

const heart = document.getElementById("heart")

const words = []
const total = 60
let rotation = 0

for(let i=0;i<total;i++){
let span=document.createElement("span")
span.className="word"
span.innerText="Somi"
heart.appendChild(span)
words.push(span)
}

function draw(){

rotation += 0.02

for(let i=0;i<words.length;i++){

let t = (i/words.length) * Math.PI * 2

let x = 16*Math.pow(Math.sin(t+rotation),3)
let y = 13*Math.cos(t+rotation)
       -5*Math.cos(2*(t+rotation))
       -2*Math.cos(3*(t+rotation))
       -Math.cos(4*(t+rotation))

x *= 15
y *= -15

words[i].style.left = 250 + x + "px"
words[i].style.top  = 200 + y + "px"

}

requestAnimationFrame(draw)

}

draw()

/* typing sentences */

const sentences = [
"You are my strong lady, and even in difficult moments your strength shines beautifully.",
"Your courage and spirit inspire me more than words can ever express.",
"Even when you feel weak today, remember that your heart is incredibly powerful.",
"Take your time to rest and recover, my princess, because you deserve peace and care.",
"The world becomes brighter every time your beautiful smile returns.",
"I am always here cheering for you and wishing you a fast and healthy recovery."
]

const message = document.getElementById("message")

let s = 0
let c = 0

function type(){

if(s < sentences.length){

if(c < sentences[s].length){

message.innerHTML = sentences[s].substring(0,c+1) + '<span class="cursor"></span>'
c++
setTimeout(type,40)

}else{

message.innerHTML += "<br><br>"
s++
c = 0
setTimeout(type,800)

}

}

}

type()

</script>

</body>
</html>
