<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Princess</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff758f,#ff7eb3,#ff4d6d);
font-family:Arial;
overflow:hidden;
color:white;
}

/* headline */

h1{
font-size:50px;
margin-bottom:40px;
text-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* rotating heart container */

.heart{
position:relative;
width:350px;
height:350px;
animation:rotate 12s linear infinite;
}

@keyframes rotate{
100%{transform:rotate(360deg);}
}

/* sorry words */

.word{
position:absolute;
font-weight:bold;
font-size:18px;
color:white;
text-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* floating hearts background */

.bg span{
position:absolute;
bottom:-50px;
font-size:20px;
animation:float 10s linear infinite;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

</style>

</head>

<body>

<h1>For My Princess ❤️</h1>

<div class="heart">

<span class="word" style="left:170px;top:30px;">SORRY</span>
<span class="word" style="left:230px;top:60px;">SORRY</span>
<span class="word" style="left:270px;top:120px;">SORRY</span>
<span class="word" style="left:260px;top:180px;">SORRY</span>
<span class="word" style="left:210px;top:240px;">SORRY</span>
<span class="word" style="left:170px;top:270px;">SORRY</span>

<span class="word" style="left:120px;top:240px;">SORRY</span>
<span class="word" style="left:80px;top:180px;">SORRY</span>
<span class="word" style="left:70px;top:120px;">SORRY</span>
<span class="word" style="left:110px;top:60px;">SORRY</span>

</div>

<div class="bg">
<span style="left:10%">❤️</span>
<span style="left:20%">❤️</span>
<span style="left:30%">❤️</span>
<span style="left:40%">❤️</span>
<span style="left:50%">❤️</span>
<span style="left:60%">❤️</span>
<span style="left:70%">❤️</span>
<span style="left:80%">❤️</span>
<span style="left:90%">❤️</span>
</div>

</body>
</html>
